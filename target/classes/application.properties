# =====================================================
# Database Configuration
# =====================================================
# Override with environment variables: DB_USER, DB_PASSWORD, DB_URL
database.driver=com.mysql.cj.jdbc.Driver
database.url=jdbc:mysql://localhost:3306/QuanLyKTX?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&useSSL=false&allowPublicKeyRetrieval=true
database.username=${DB_USER:root}
database.password=${DB_PASSWORD:123456}

# =====================================================
# Hibernate Configuration
# =====================================================
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=${SHOW_SQL:false}
hibernate.format_sql=${FORMAT_SQL:true}
hibernate.hbm2ddl.auto=none
hibernate.connection.pool_size=5
hibernate.hikari.maximum-pool-size=20
hibernate.hikari.minimum-idle=5
hibernate.hikari.connection-timeout=30000
hibernate.hikari.idle-timeout=600000

# =====================================================
# Application Configuration
# =====================================================
application.name=Hệ Thống Quản Lý Ký Túc Xá
application.version=1.0.0
session.timeout=1800000

# =====================================================
# Security Configuration
# =====================================================
security.password.policy.min.length=8
security.password.policy.require.uppercase=true
security.password.policy.require.lowercase=true
security.password.policy.require.digits=true
security.password.policy.require.special.chars=true
security.password.policy.pattern=^(?=.*[A-Za-z])(?=.*\\d)(?=.*[@$!%*#?&])[A-Za-z\\d@$!%*#?&]{8,}$

# =====================================================
# Logging Configuration
# =====================================================
logging.level.com.ktx=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.path=logs/
logging.file.max-size=10MB
logging.file.max-history=30

# =====================================================
# UI Configuration
# =====================================================
ui.theme.default=light
ui.font.size=12
ui.animation.enabled=true

# =====================================================
# Performance Configuration
# =====================================================
performance.cache.enabled=true
performance.cache.ttl=3600
performance.pagination.default.size=20
performance.pagination.max.size=100
